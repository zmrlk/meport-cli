[package]
name = "meport-desktop"
version = "0.2.7"
description = "Meport — Your AI personality engine"
authors = ["Karol Zamarlik"]
license = "MIT"
repository = "https://github.com/zmrlk/meport"
edition = "2021"
rust-version = "1.77.2"

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.6", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4"
tauri = { version = "2.10.3", features = [] }
tauri-plugin-log = "2"
tauri-plugin-fs = "2"
tauri-plugin-clipboard-manager = "2"
tauri-plugin-dialog = "2"
dirs = "6"
url = "2"
